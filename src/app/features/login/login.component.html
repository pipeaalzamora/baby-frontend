<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 44 44" fill="none">
          <circle cx="22" cy="22" r="18" fill="rgba(255,255,255,0.15)"/>
          <circle cx="17" cy="20" r="2.5" fill="white" opacity="0.9"/>
          <circle cx="27" cy="20" r="2.5" fill="white" opacity="0.9"/>
          <path d="M15 27c1.8 2.2 3.8 3 7 3s5.2-.8 7-3" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="17" cy="20" r="1" fill="#1e293b"/>
          <circle cx="27" cy="20" r="1" fill="#1e293b"/>
        </svg>
      </div>
      <h1 class="brand-name">BabyApp</h1>
      <p class="brand-tagline">El diario de crecimiento de tu bebé</p>
    </div>

    <div class="login-content">
      <h2 class="login-title">Bienvenido de vuelta</h2>
      <p class="login-subtitle">Inicia sesión para continuar</p>

      @if (error()) {
        <div class="error-banner" role="alert">
          <svg viewBox="0 0 20 20" fill="currentColor" class="error-icon">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          <span>{{ error() }}</span>
        </div>
      }

      @if (loading()) {
        <div class="loading-state">
          <div class="spinner"></div>
          <span>Verificando...</span>
        </div>
      } @else {
        <button class="google-login-btn" type="button" (click)="login()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.6 12.2c0-.8-.1-1.6-.2-2.3H12v4.4h5.9c-.3 1.4-1 2.5-2.1 3.2v2.7h3.4c2-1.8 3.4-4.4 3.4-8z"/>
            <path fill="#34A853" d="M12 23c3 0 5.5-1 7.3-2.7l-3.4-2.7c-.9.6-2.2 1-3.8 1-2.9 0-5.4-2-6.3-4.6H2.2v2.8C4 20.5 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.7 14c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2V7.2H2.2C1.4 8.7 1 10.3 1 12s.4 3.3 1.2 4.8L5.7 14z"/>
            <path fill="#EA4335" d="M12 5.4c1.6 0 3.1.6 4.2 1.7l3.1-3.1C17.5 2.1 15 1 12 1 7.7 1 4 3.5 2.2 7.2L5.7 10c.9-2.7 3.4-4.6 6.3-4.6z"/>
          </svg>
          Continuar con Google
        </button>
      }

      <p class="privacy-note">
        Al iniciar sesión aceptas nuestros términos de uso.<br>Tu información está protegida.
      </p>
    </div>
  </div>
</div>
