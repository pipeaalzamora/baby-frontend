<div class="setup-page">
  <div class="setup-card">
    <div class="setup-header">
      <div class="setup-logo">🍼</div>
      <h1 class="setup-title">¡Bienvenido!</h1>
      <p class="setup-subtitle">Crea el perfil de tu bebé para comenzar</p>
    </div>

    <form class="setup-form" (ngSubmit)="save()">
      <div class="form-group">
        <label for="name">Nombre del bebé *</label>
        <input id="name" type="text" [(ngModel)]="name" name="name"
               placeholder="Ej: Sofía" autocomplete="off" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="birthDate">Fecha de nacimiento *</label>
          <input id="birthDate" type="date" [(ngModel)]="birthDate" name="birthDate"
                 [max]="maxDate" required />
        </div>

        <div class="form-group">
          <label>Sexo *</label>
          <div class="gender-toggle">
            <button type="button" class="gender-btn"
                    [class.gender-btn--active]="gender === 'M'"
                    (click)="gender = 'M'">
              Niño
            </button>
            <button type="button" class="gender-btn"
                    [class.gender-btn--active]="gender === 'F'"
                    (click)="gender = 'F'">
              Niña
            </button>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="weight">Peso al nacer (kg)</label>
          <input id="weight" type="number" [(ngModel)]="birthWeightKg" name="birthWeightKg"
                 min="0.5" max="6" step="0.01" placeholder="3.20" />
        </div>

        <div class="form-group">
          <label for="height">Talla al nacer (cm)</label>
          <input id="height" type="number" [(ngModel)]="birthHeightCm" name="birthHeightCm"
                 min="30" max="70" step="0.1" placeholder="50" />
        </div>
      </div>

      <div class="form-group">
        <label for="blood">Grupo sanguíneo <span class="optional">(opcional)</span></label>
        <select id="blood" [(ngModel)]="bloodType" name="bloodType">
          <option value="">No sé / No especificar</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option>
          <option>O+</option><option>O-</option>
        </select>
      </div>

      @if (errorMsg()) {
        <p class="error-msg">{{ errorMsg() }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="saving()">
        @if (saving()) { Guardando... } @else { Guardar perfil }
      </button>
    </form>
  </div>
</div>
