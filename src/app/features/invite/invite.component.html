<div class="invite-page">
  <div class="invite-card">
    @switch (state()) {
      @case ('loading') {
        <div class="dots-loader"><span></span><span></span><span></span></div>
        <p class="invite-msg">{{ message() }}</p>
      }
      @case ('ok') {
        <div class="invite-icon invite-icon--ok">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </div>
        <h1 class="invite-title">Acceso concedido</h1>
        <p class="invite-msg">{{ message() }}</p>
        <button class="btn btn--confirm" (click)="goDashboard()" type="button">Ir al inicio</button>
      }
      @case ('error') {
        <div class="invite-icon invite-icon--error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </div>
        <h1 class="invite-title">No se pudo aceptar</h1>
        <p class="invite-msg">{{ message() }}</p>
        <button class="btn btn--confirm" (click)="goDashboard()" type="button">Ir al inicio</button>
      }
    }
  </div>
</div>
