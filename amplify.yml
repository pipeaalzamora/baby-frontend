version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/baby-web
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*.glb'
      headers:
        - key: Content-Type
          value: model/gltf-binary
        - key: Cache-Control
          value: public, max-age=31536000
